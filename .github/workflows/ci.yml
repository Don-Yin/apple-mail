name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt
          python -m pip check

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python modules
        run: python -m compileall -q scripts tests

      - name: Check JavaScript syntax
        run: node --check scripts/lib/mail_core.js

      - name: Check shell syntax
        run: bash -n scripts/mail.sh scripts/check-setup.sh scripts/rebuild-index.sh

      - name: Reject private runtime artifacts
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '\.(db|sqlite|wal|shm|eml|mbox|ips|log)$'; then
            echo "private runtime artifact is tracked"
            exit 1
          fi
          python - <<'PY'
          from pathlib import Path
          import re

          root = Path('.')
          excluded = {Path('.github/workflows/ci.yml')}
          text_suffixes = {'.py', '.js', '.sh', '.md', '.json', '.yml', '.yaml', '.toml'}
          forbidden_literals = (
              'dy323@cam.ac.uk',
              'Don_Yin@outlook.com',
              '/Users/dy323',
              'CWLP',
              'AAMkAD',
          )
          credential = re.compile(
              r'(?i)(access[_-]?token|refresh[_-]?token|client[_-]?secret|password)'
              r'\s*[:=]\s*["\'][^"\']+["\']'
          )
          findings = []
          for path in root.rglob('*'):
              if not path.is_file() or '.git' in path.parts or path in excluded:
                  continue
              if path.suffix.lower() not in text_suffixes:
                  continue
              text = path.read_text(encoding='utf-8', errors='replace')
              if any(value in text for value in forbidden_literals) or credential.search(text):
                  findings.append(str(path))
          if findings:
              raise SystemExit('private account, path, message ID, or credential-like value found: ' + ', '.join(findings))
          PY
