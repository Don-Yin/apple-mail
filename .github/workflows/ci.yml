name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/requirements.txt
          python -m pip check

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python modules
        run: python -m compileall -q scripts tests

      - name: Check JavaScript syntax
        run: node --check scripts/lib/mail_core.js

      - name: Check shell syntax
        run: bash -n scripts/mail.sh scripts/check-setup.sh scripts/rebuild-index.sh

      - name: Reject private runtime artifacts
        shell: bash
        run: |
          set -euo pipefail
          if git ls-files | grep -E '\.(db|sqlite|wal|shm|eml|mbox|ips|log)$'; then
            echo "private runtime artifact is tracked"
            exit 1
          fi
          python - <<'PY'
          from pathlib import Path
          import re
          import subprocess

          root = Path('.')
          excluded = {Path('.github/workflows/ci.yml')}
          text_suffixes = {'.py', '.js', '.sh', '.md', '.json', '.yml', '.yaml', '.toml'}
          forbidden_patterns = (
              re.compile(r'/Users/[A-Za-z0-9._-]+'),
              re.compile(r'\bAAMkAD[A-Za-z0-9_=+-]{20,}'),
              re.compile(r'\b[A-Z]{4}[0-9]{3}MB[0-9]{4}[A-Z0-9]*\b'),
              re.compile(
                  r'(?i)(access[_-]?token|refresh[_-]?token|client[_-]?secret|password)'
                  r'\s*[:=]\s*["\'][^"\']+["\']'
              ),
          )
          findings = []
          tracked = subprocess.check_output(['git', 'ls-files'], text=True).splitlines()
          for relative in tracked:
              path = Path(relative)
              if path in excluded or path.suffix.lower() not in text_suffixes:
                  continue
              text = path.read_text(encoding='utf-8', errors='replace')
              if any(pattern.search(text) for pattern in forbidden_patterns):
                  findings.append(str(path))
          if findings:
              raise SystemExit('private path, Exchange identifier, or credential-like value found: ' + ', '.join(findings))
          PY

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
